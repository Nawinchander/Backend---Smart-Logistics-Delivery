version: '3'

services:

  backend:
    build: .
    ports:
      - '5000:5000'

    depends_on:
      - mysql
      - mongo
      - redis

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: logistics_db

  mongo:
    image: mongo

  redis:
    image: redis